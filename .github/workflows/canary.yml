name: canary

on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点 UTC
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: read
  issues: write           # 失败时开 issue

jobs:
  check:
    name: production health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run lightweight canary
        id: canary
        env:
          API: ${{ vars.CANARY_API_URL || 'https://loverush-production.up.railway.app' }}
        run: bash scripts/lightweight-canary.sh | tee canary.log

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.existsSync('canary.log') ? fs.readFileSync('canary.log', 'utf8') : '(no log)';
            const date = new Date().toISOString().slice(0, 10);
            const title = `canary FAIL · ${date} ${new Date().toISOString().slice(11,16)}Z`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Canary check failed',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '### Output',
                '```',
                log.slice(0, 4000),
                '```',
                '',
                '_Auto-created by .github/workflows/canary.yml_',
              ].join('\n'),
              labels: ['canary', 'incident'],
            });
