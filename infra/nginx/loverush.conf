# LoveRush Nginx 反向代理 · 前置在 Vultr / DO 主机上
# Cloudflare 在 nginx 前面做 DDoS 防护 + 缓存 + 全球加速
#
# 安装：
#   sudo cp infra/nginx/loverush.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/loverush.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS 证书：从 Cloudflare 拿"原始服务器证书"（origin cert）配上即可，
# 客户端 → Cloudflare 用 Cloudflare CA，Cloudflare → origin 用 origin cert。

# ──────────────── api.loverush.com → 8787 ────────────────

server {
    listen 443 ssl http2;
    server_name api.loverush.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 仅接受来自 Cloudflare IP 的请求（额外防护）
    # https://www.cloudflare.com/ips-v4
    # include /etc/nginx/cloudflare-ips.conf;
    # deny all;

    # webhooks 路径不走 cors / 不缓存
    location /webhooks/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 60s;
        # Stripe webhook 需要原始 body
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # 限制大文件上传走 R2 直接 PUT，不经过 nginx
    client_max_body_size 1m;
}

# ──────────────── loverush.com (web) → 3000 ────────────────
# 仅在不用 Cloudflare Pages 时启用本段。

server {
    listen 443 ssl http2;
    server_name loverush.com www.loverush.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # PWA · service worker 必须不缓存（避免老 sw 卡住）
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ──────────────── admin.loverush.com → 3001（仅白名单） ────────────────

server {
    listen 443 ssl http2;
    server_name admin.loverush.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # IP 白名单（运营团队办公室 IP）· Cloudflare Access 可替代
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ──────────────── HTTP → HTTPS 强制跳转 ────────────────

server {
    listen 80;
    server_name api.loverush.com loverush.com www.loverush.com admin.loverush.com;
    return 301 https://$host$request_uri;
}
